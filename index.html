<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anandu — Portfolio</title>
  <meta name="description" content="Portfolio of Anandu — coming soon." />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src  'self' https://unpkg.com/htmx.org/;
    style-src   'self' https://fonts.googleapis.com;
    font-src    https://fonts.gstatic.com;
    img-src     'self';
    connect-src https://api.web3forms.com;
    frame-ancestors 'none';
  " />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4"
    integrity="sha384-M06VwgoUOHG3FN0UchwWKqh9jS4ejwpoL0yjF3EVljtsxFwFETEYMkyNL5lXbJ5/"
    crossorigin="anonymous" defer></script>
</head>
<body>
  <div class="grid">

    <!-- Row 1: header -->
    <header class="cell cell--header">
      <span class="wordmark">Anandu</span>
      <span class="status-pill">In progress</span>
    </header>

    <!-- Row 2: image panel -->
    <div class="cell cell--image">
      <img src="static/anandu_18bit.png" alt="Anandu" />
    </div>

    <!-- Row 2: left panel -->
    <div class="cell cell--left">
      <p class="eyebrow" aria-label="Portfolio">
        <span class="letter" style="--i:0">P</span><span class="letter" style="--i:1">O</span><span class="letter" style="--i:2">R</span><span class="letter" style="--i:3">T</span><span class="letter" style="--i:4">F</span><span class="letter" style="--i:5">O</span><span class="letter" style="--i:6">L</span><span class="letter" style="--i:7">I</span><span class="letter" style="--i:8">O</span>
      </p>
      <div class="rule-group" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p class="tagline">A new portfolio<br />is taking shape.</p>
      <p class="sub">In the meantime,<br />reach out below.</p>
    </div>

    <!-- Row 2: right panel -->
    <div class="cell cell--right">
      <form
        id="contact-form"
        hx-post="https://api.web3forms.com/submit"
        hx-indicator="#form-indicator"
        hx-on::after-request="handleResponse(event)"
        class="madlibs-form"
        novalidate
      >
        <input type="hidden" name="access_key" value="7cb6a09a-57be-40cc-a191-b44d57762ef2" />
        <input type="hidden" name="subject" value="Portfolio enquiry" />
        <input type="hidden" name="from_name" value="Standby page" />
        <input type="checkbox" name="botcheck" class="botcheck" tabindex="-1" autocomplete="off" />

        <p class="madlibs-text">
          I'm&#32;<input
            class="ml-input" name="name" type="text"
            placeholder="your name" size="10"
            autocomplete="name" required
          />,&#32;reaching out about&#32;<input
            class="ml-input ml-wide" name="about" type="text"
            placeholder="a project, a role…" size="18"
            required
          />. You can reply to&#32;<input
            class="ml-input ml-wide" name="email" type="email"
            placeholder="your@email.com" size="16"
            autocomplete="email" required
          />.
        </p>

        <div class="form-footer">
          <button type="submit" class="submit-btn">
            <span>Send</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4M9.5 2.5V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span id="form-indicator" class="htmx-indicator sending-label">Sending…</span>
        </div>
      </form>

      <div id="contact-result" role="status" aria-live="polite"></div>
    </div>

    <!-- Row 3: footer -->
    <footer class="cell cell--footer">
      <span class="copy">&copy; <span id="yr"></span> Anandu</span>
      <nav class="footer-links" aria-label="Social links">
        <a href="https://github.com/uanandu" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://linkedin.com/in/uanandu" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </nav>
    </footer>

  </div>

  <script src="static/script.js" defer></script>
</body>
</html>
